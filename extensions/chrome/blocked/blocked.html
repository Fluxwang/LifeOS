<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>已屏蔽 · BLOCKADE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: light dark;
  --bg:#fbfbfc; --grid:#0b0d12; --surface:#ffffff;
  --border:#e6e8ec; --border-strong:#d4d8de;
  --text:#0b0d12; --muted:#656b76; --faint:#9aa0aa;
  --accent:#2f6df6; --accent-ink:#ffffff; --accent-soft:#eaf1fe;
  --danger:#e5484d; --danger-soft:#fdecec;
  --mono:"Geist Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --sans:"Geist",-apple-system,system-ui,"Segoe UI",sans-serif;
  --shadow:0 1px 2px rgba(10,13,18,.05),0 24px 60px rgba(10,13,18,.10);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#08090b; --grid:#ffffff; --surface:#101216;
    --border:#23252c; --border-strong:#33363f;
    --text:#f1f2f4; --muted:#9097a1; --faint:#5d636d;
    --accent:#4d8bff; --accent-ink:#06101f; --accent-soft:#15263f;
    --danger:#ff5c61; --danger-soft:#2a1416;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 28px 70px rgba(0,0,0,.6);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:32px;position:relative;overflow:hidden;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(to right, color-mix(in srgb,var(--grid) 4%,transparent) 1px, transparent 1px),
    linear-gradient(to bottom, color-mix(in srgb,var(--grid) 4%,transparent) 1px, transparent 1px);
  background-size:44px 44px;
  -webkit-mask-image:radial-gradient(circle at 50% 42%, #000 0%, transparent 72%);
          mask-image:radial-gradient(circle at 50% 42%, #000 0%, transparent 72%);
}
.card{
  position:relative;z-index:1;width:100%;max-width:520px;
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  box-shadow:var(--shadow);padding:38px 36px 30px;text-align:center;
}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:30px;
}
.brand{display:flex;align-items:center;gap:8px}
.brand .word{font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.18em;color:var(--muted)}
.flag{
  font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;
  color:var(--danger);background:var(--danger-soft);padding:4px 9px;border-radius:6px;
}
.seal{
  width:84px;height:84px;margin:6px auto 22px;position:relative;
}
.seal svg{width:100%;height:100%;display:block}
.seal::after{
  content:"";position:absolute;inset:-10px;border-radius:50%;
  background:radial-gradient(circle, color-mix(in srgb,var(--danger) 16%,transparent), transparent 70%);
  z-index:-1;
}
h1{
  font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.12;margin-bottom:10px;
}
.sub{
  font-family:var(--mono);font-size:13px;color:var(--muted);line-height:1.55;
  max-width:380px;margin:0 auto 26px;letter-spacing:.005em;
}
.plate{
  display:flex;align-items:center;gap:0;margin:0 auto 28px;max-width:420px;
  border:1px solid var(--border-strong);border-radius:11px;overflow:hidden;
  background:var(--bg);
}
.plate .k{
  font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--faint);padding:0 14px;
  border-right:1px solid var(--border-strong);align-self:stretch;
  display:flex;align-items:center;background:color-mix(in srgb,var(--muted) 6%,transparent);
}
.plate .v{
  font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text);
  padding:14px 16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;text-align:left;
}
.actions{display:flex;flex-direction:column;gap:10px;align-items:center}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:9px;
  height:44px;padding:0 22px;border-radius:10px;border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text);
  font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;
  transition:background .12s,border-color .12s,transform .05s;
}
.btn:hover{background:color-mix(in srgb,var(--muted) 8%,var(--surface));border-color:var(--muted)}
.btn:active{transform:translateY(1px)}
.btn .kbd{font-family:var(--mono);font-size:10px;color:var(--faint);font-weight:500;
  border:1px solid var(--border);border-radius:4px;padding:1px 5px;}
.reroll{
  background:none;border:none;cursor:pointer;color:var(--faint);
  font-family:var(--mono);font-size:11px;letter-spacing:.04em;
  display:inline-flex;align-items:center;gap:6px;padding:6px;
}
.reroll:hover{color:var(--muted)}
.reroll svg{width:12px;height:12px}
.footnote{
  margin-top:26px;padding-top:18px;border-top:1px solid var(--border);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--faint);
  text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;
}
.footnote .ico{width:11px;height:11px;opacity:.8}
</style>
</head>
<body>
<div class="card">
  <div class="topbar">
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="9" stroke="var(--danger)" stroke-width="2.4"/>
        <line x1="5.6" y1="5.6" x2="18.4" y2="18.4" stroke="var(--danger)" stroke-width="2.4"/>
      </svg>
      <span class="word">BLOCKADE</span>
    </div>
    <span class="flag">BLOCKED · 403</span>
  </div>

  <div class="seal">
    <svg viewBox="0 0 96 96" fill="none" aria-hidden="true">
      <circle cx="48" cy="48" r="40" stroke="var(--danger)" stroke-width="6"/>
      <line x1="20" y1="20" x2="76" y2="76" stroke="var(--danger)" stroke-width="6" stroke-linecap="round"/>
    </svg>
  </div>

  <h1 id="headline">这个站，被你关进小黑屋了</h1>
  <p class="sub" id="subline">Nothing to see here. 回去把那件正事做完吧。</p>

  <div class="plate">
    <span class="k">domain</span>
    <span class="v" id="domain">www.youtube.com</span>
  </div>

  <div class="actions">
    <button class="btn" id="manage">
      管理屏蔽列表
      <span class="kbd">Manage</span>
    </button>
    <button class="reroll" id="reroll">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 0 1 14-5.3M20 12a8 8 0 0 1-14 5.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18 3v3.7h-3.7M6 21v-3.7h3.7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      换一句
    </button>
  </div>

  <div class="footnote">
    <svg class="ico" viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="2"/></svg>
    enforced by you · 解铃还须系铃人
  </div>
</div>
<script src="blocked.js"></script>
</body>
</html>
